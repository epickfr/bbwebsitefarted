<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bart Blast Community • Discord</title>

    <meta property="og:title" content="Bart Blast Community" />
    <meta property="og:description" content="Join the bart." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://bb.bart.cx" />
    <meta property="og:image" content="https://i.ibb.co/7d9SFQgt/Pi7-Gif-1.gif" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta name="theme-color" content="#5865F2" />

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #36393f;
            color: #dcddde;
            font-family: 'gg sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .discord-green { color: #3ba55c; }
        .card {
            background: #2f3136;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
        }
        .banner {
            height: 140px;
            background: linear-gradient(135deg, #5865F2, #7289da, #4752c4);
            position: relative;
        }
        .server-icon {
            width: 90px;
            height: 90px;
            background: #202225;
            border-radius: 25px;
            border: 8px solid #2f3136;
            position: absolute;
            bottom: -45px;
            left: 24px;
            overflow: hidden;
            box-shadow: 0 6px 16px rgba(0,0,0,0.6);
        }
        .btn-join {
            background: #5865F2;
            color: white;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 6px;
            transition: all 0.2s;
            text-decoration: none;
            display: block;
            text-align: center;
            font-size: 1.125rem;
        }
        .btn-join:hover {
            background: #4752c4;
            transform: translateY(-1px);
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px currentColor;
        }
        .loading { opacity: 0.7; filter: blur(0.5px); transition: all 0.4s; }
        .error-text { color: #f04747; font-size: 0.875rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="card">
        <div class="banner">
            <div class="server-icon">
                <img src="https://i.ibb.co/7d9SFQgt/Pi7-Gif-1.gif" alt="Bart Blast Icon" class="w-full h-full object-cover">
            </div>
        </div>

        <div class="p-10 pt-16">
            <h1 class="text-4xl font-extrabold text-white mb-3 tracking-tight">
                Bart Blast!
            </h1>

            <p class="text-[#b9bbbe] mb-8 text-base leading-relaxed">
                
            </p>

            <div class="flex flex-wrap items-center gap-8 mb-10 text-base" id="member-stats">
                <div class="flex items-center">
                    <span class="status-dot bg-[#3ba55c]"></span>
                    <span class="discord-green font-bold" id="online-count">Loading...</span>
                    <span class="ml-2 text-[#b9bbbe]">Online</span>
                </div>
                <div class="flex items-center">
                    <span class="status-dot bg-[#b9bbbe]"></span>
                    <span class="font-bold text-[#b9bbbe]" id="total-count">—</span>
                    <span class="ml-2 text-[#b9bbbe]">Members</span>
                </div>
            </div>

            <a href="https://discord.gg/ZNSWK5vgQa"
               target="_blank"
               class="btn-join">
                Join the Blast
            </a>

            <p class="text-center text-xs text-[#72767d] mt-8">
                Discord account required
            </p>
        </div>
    </div>

    <footer class="fixed bottom-4 left-0 right-0 text-center text-xs text-gray-500">
        Powered by my ass • discord.gg/ZNSWK5vgQa
    </footer>

    <script>
        const SERVER_ID = "1472087830091268298";

        async function updateMemberCounts() {
            const statsEl = document.getElementById("member-stats");
            const onlineEl = document.getElementById("online-count");
            const totalEl = document.getElementById("total-count");

            try {
                const response = await fetch(`https://discord.com/api/guilds/${SERVER_ID}/widget.json`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();

                const online = data.presence_count || 0;
                const total = data.member_count || 0;

                onlineEl.textContent = online.toLocaleString();

                if (total > 0) {
                    totalEl.textContent = total.toLocaleString();
                } else {
                    totalEl.textContent = "Small but chaotic";
                    totalEl.classList.add("italic");
                }

                statsEl.classList.remove("loading");
            } catch (err) {
                console.warn("Widget fetch issue:", err);
                onlineEl.textContent = "13-ish";
                totalEl.textContent = "Growing fast";
                totalEl.classList.add("error-text");
                statsEl.classList.remove("loading");
            }
        }

        updateMemberCounts();
        setInterval(updateMemberCounts, 120000);
    </script>

</body>
</html>
