<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bart Blast Community | Join Discord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #0d1117;
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 6px;
            border: 2px solid #0d1117;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #58a6ff;
        }

        html {
            scroll-behavior: smooth;
        }

        .glass-panel {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glow-blue {
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
        }
        
        .glow-purple {
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
        }

        .transition-all-custom {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body class="bg-[#010409] text-gray-200 font-sans selection:bg-[#58a6ff] selection:text-white">

    <div class="fixed inset-0 z-[-1] overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-blue-900/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-purple-900/20 rounded-full blur-[120px]"></div>
    </div>

    <main class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="glass-panel p-8 md:p-12 rounded-3xl max-w-2xl w-full text-center transition-all-custom hover:scale-[1.02] hover:glow-blue">
            <h1 class="text-5xl font-extrabold mb-6 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                Join Our Discord
            </h1>
            <p class="text-gray-400 mb-10 text-lg">
                Connect with our special community...
            </p>

            <div class="flex flex-col gap-4">
                <a href="https://discord.gg/ZNSWK5vgQa" target="_blank" 
                   class="group relative inline-flex items-center justify-center px-8 py-4 bg-[#5865F2] hover:bg-[#4752C4] text-white font-bold rounded-xl transition-all-custom glow-purple hover:scale-[1.05] hover:shadow-[0_0_30px_rgba(88,101,242,0.6)]">
                    Join Discord Server
                    <span class="ml-2 transition-transform duration-500 group-hover:translate-x-2">→</span>
                </a>
            </div>
        </div>

        <footer class="mt-12 text-gray-600 text-sm">
            Powered by my ass
        </footer>
    </main>

    <script>
        document.querySelectorAll('a').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                console.log("Navigating to discord...");
            });
        });
    </script>
</body>
</html>
